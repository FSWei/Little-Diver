[env:esp32s3-wroom-n8r2]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

; N8R2 Flash + PSRAM
board_build.flash_mode = qio
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = default_8MB.csv   ; ← 只保留这一个，8MB板用这个给LittleFS留足空间
board_build.arduino.memory_type = qio_qspi
board_build.psram_type = qio
board_build.extra_flags = -DBOARD_HAS_PSRAM

; 指定文件系统为 LittleFS
board_build.filesystem = littlefs

; 修正 USB CDC 配置：关闭USB虚拟串口，使用硬件串口0输出
build_flags =
    -DARDUINO_USB_MODE=0          ; 禁用USB CDC模式
    -DARDUINO_USB_CDC_ON_BOOT=0   ; 关闭开机自动启用CDC
    -DCORE_DEBUG_LEVEL=3          ; 开启调试日志（可选，帮助排查）

; 串口监控配置
monitor_speed = 115200
monitor_filters = default
; monitor_port = COM3

lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    olikraus/U8g2@^2.36.5
    madhephaestus/ESP32Servo@^3.0.6
    earlephilhower/ESP8266Audio @ ^1.9.7

upload_speed = 921600